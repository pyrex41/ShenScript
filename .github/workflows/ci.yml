name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm run lint
      - run: npm run verify-kernel
      - run: npm run render-kernel
      - run: npm run test-backend
      - run: npm run test-cli
      - run: npm run test-frontend
      - run: npm run test-kernel
      - run: npm run test-kernel-extensions
      - run: npm run test-ratatoskr
      - run: npm run bundles

  bun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
      - run: npm ci
      - run: npm run render-kernel
      - run: npm run test-smoke-bun
      - run: npm run test-kernel-bun

  deno:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: npm ci
      - run: npm run render-kernel
      - run: npm run test-smoke-deno
      - run: npm run test-kernel-deno
